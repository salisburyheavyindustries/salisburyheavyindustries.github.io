<html>
<head>
    <title>Salisbury Heavy Industries</title>
</head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter">
    <style>
        body {
            font-family: 'Inter', serif;
        }

        #name {
            font-size: 14vw;
            font-weight: bold;
        }

        #links {
            font-size: 5vw;
        }

        a {
            color: black;
        }

        .section {
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
    <script text="text/javascript">
        const links = [
            { text: "CV", href: "Joseph Salisbury CV Q2 2026.pdf", external: true },
            { text: "Projects", children: [
                { text: "Where Mega Skip?", href: "https://www.wheremegaskip.com", external: true },
            ]},
            { text: "Socials", children: [
                { text: "Bluesky", href: "https://bsky.app/profile/salisburyheavyindustries.com", external: true },
                { text: "GitHub", href: "https://github.com/JosephSalisbury", external: true },
                { text: "LinkedIn", href: "https://www.linkedin.com/in/salisburyheavyindustries", external: true },
            ]},
            { text: "Talks", href: "https://www.youtube.com/playlist?list=PLe2laH02AdCw9stHJKEs5B_ml1XmrJT5H", external: true },
            { text: "TTRPGs", children: [
                { text: "Campaign 2", href: "campaign2" },
            ]},
        ];

        function renderLink(link) {
            const target = link.external ? ' target="_blank"' : "";
            return `<a href="${link.href}"${target}>${link.text}</a>`;
        }

        window.onload = function() {
            const linksEl = document.getElementById("links");

            linksEl.innerHTML = links.map((link, i) => {
                if (link.href) return renderLink(link);
                return `<span class="section" data-key="${i}">${link.text}</span>`;
            }).join("\n");

            linksEl.onclick = function(e) {
                if (e.target.tagName === "A") return;

                const section = e.target.closest(".section");
                if (!section) return;

                const link = links[section.dataset.key];
                if (!link || !link.children) return;

                section.innerHTML = link.children.map(renderLink).join(" ");
                section.classList.remove("section");

                setTimeout(() => {
                    section.innerHTML = link.text;
                    section.classList.add("section");
                }, 5000);
            };
        };
    </script>
    <body>
        <div>
            <div id="name">Joseph Salisbury</div>
            <div id="links"></div>
        </div>
    </body>
</html>
